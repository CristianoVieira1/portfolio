        const brazilTimezones = new Set([
          "America/Sao_Paulo",
          "America/Rio_Branco",
          "America/Manaus",
          "America/Belem",
          "America/Fortaleza",
          "America/Recife",
          "America/Maceio",
          "America/Bahia",
          "America/Araguaina",
          "America/Cuiaba",
          "America/Campo_Grande",
          "America/Porto_Velho",
          "America/Boa_Vista",
          "America/Noronha",
        ]);

        const browserLanguages = [...(navigator.languages || []), navigator.language]
          .filter(Boolean)
          .map((lang) => lang.toLowerCase());

        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const isBrazilLocale = browserLanguages.includes("pt-br");
        const isBrazilTimezone = Boolean(timeZone) && brazilTimezones.has(timeZone);
        const usePortuguese = isBrazilLocale || isBrazilTimezone;
        const selected = usePortuguese ? contentByLocale.ptBR : contentByLocale.en;

        const setMeta = (selector, value) => {
          const tag = document.querySelector(selector);
          if (tag && value) {
            tag.setAttribute("content", value);
          }
        };

        document.documentElement.lang = selected.htmlLang;
        document.title = selected.title;

        setMeta('meta[name="description"]', selected.description);
        setMeta('meta[name="keywords"]', selected.keywords);
        setMeta('meta[property="og:title"]', selected.ogTitle);
        setMeta('meta[property="og:description"]', selected.ogDescription);
        setMeta('meta[property="og:site_name"]', selected.ogSiteName);
        setMeta('meta[property="og:locale"]', selected.ogLocale);
        setMeta('meta[name="twitter:title"]', selected.twitterTitle);
        setMeta('meta[name="twitter:description"]', selected.twitterDescription);
